<ion-content [fullscreen]="true">


  <!-- Header -->
  <div class="movement-header">

    <button class="movement-header__back">
      <ion-icon name="arrow-back-outline"></ion-icon>
    </button>

    <h1 class="movement-header__title">
      Registrar movimiento
    </h1>

  </div>

  <div class="content">
    <!-- Selector tipo movimiento -->
    <div class="movement-container">

      <!-- Segmented Control -->
      <div class="movement-segment">

        <div class="movement-segment__slider" [class.expense]="transactionType === 'expense'"></div>

        <button class="movement-segment__btn" [class.active]="transactionType === 'income'"
          (click)="setTransaction('income')">
          <ion-icon name="trending-up-outline"></ion-icon>
          <span>Ingreso</span>
        </button>

        <button class="movement-segment__btn" [class.active]="transactionType === 'expense'"
          (click)="setTransaction('expense')">
          <ion-icon name="trending-down-outline"></ion-icon>
          <span>Gasto</span>
        </button>

      </div>

    </div>


    <!-- Gastos -->
    <ng-container *ngIf="transactionType == 'expense'">
      <!-- Input Movimiento -->
      <div class="movement-container">
        <div class="movement-card">

          <label class="movement-card__label">
            Título del movimiento
          </label>

          <input class="movement-card__input" type="text" placeholder="Ej: Supermercado, Plan celular"
            [(ngModel)]="title" (blur)="touched.title = true" [class.invalid]="isTitleInvalid" />

          <span class="error-text" *ngIf="isTitleInvalid">
            El título es obligatorio
          </span>


        </div>
      </div>

      <!-- Input Monto -->
      <div class="movement-container">

        <app-amount-input
          [currency]="currency"
          [displayAmount]="displayAmount"
          [invalid]="isAmountInvalid"
          [ufValue]="UF_VALUE"
          [showUFInfo]="currency === 'uf'"
          [clpAmount]="getCLPAmount()"

          (currencyChange)="setCurrency($event)"
          (amountChange)="onAmountInput($event)"
          (blur)="touched.amount = true"
        />

      </div>

      <!-- Categorias -->
      <div class="movement-container">

        <app-category-selector 
          [categories]="categories" 
          [loading]="isLoadingCategories" 
          [error]="categoriesError"
          [selectedId]="selectedCategory" 
          [invalid]="isCategoryInvalid" 
          (select)="selectCategory($event)"
          (retry)="reloadCategories()" 
          />

      </div>

      <!-- Compartido -->
      <div class="movement-container">
        <div class="movement-card">
          <div class="shared-header">
            <div>
              <label class="shared-title">
                Gasto compartido
              </label>
              <p class="shared-subtitle">
                Dividir este gasto con otros
              </p>
            </div>
            <button class="shared-toggle" [class.active]="isShared" (click)="toggleShared()">
              <div class="shared-toggle__circle"></div>
            </button>
          </div>
          <button *ngIf="isShared" class="shared-config-btn" (click)="openSharedExpenseModal()">
            Configurar división
          </button>
        </div>
      </div>
    </ng-container>


    <!-- Ingresos -->
    <ng-container *ngIf="transactionType == 'income'">
      <!-- Input Movimiento -->
      <div class="movement-container">
        <div class="movement-card">
          <label class="movement-card__label">
            Título del movimiento
          </label>
          <input class="movement-card__input" type="text" placeholder="Ej: Bono, Sueldo" [(ngModel)]="title" />
        </div>
      </div>

      <!-- Input Monto -->
      <div class="movement-container">
        <div class="movement-card">

          <!-- monto -->
          <label class="movement-card__label">
            Monto (CLP)
          </label>
          <div class="amount-input">

            <input type="text" inputmode="numeric" class="amount-input__field" (blur)="touched.amount = true"
              placeholder="0" [ngModel]="displayAmount" (ngModelChange)="onAmountInput($event)"
              [class.invalid]="isAmountInvalid" />

            <span class="error-text" *ngIf="isAmountInvalid">
              Ingresa un monto válido
            </span>

          </div>
        </div>
      </div>
    </ng-container>

    <!-- Boton Guardar -->
    <div style="padding-bottom: 25px;" class="movement-container">
      <button class="submit-btn" (click)="submitMovement()" [disabled]="isSubmitting || !isFormValid">

        <ion-spinner *ngIf="isSubmitting"></ion-spinner>

        <span *ngIf="!isSubmitting">
          {{ transactionType === 'income'
          ? 'Guardar ingreso'
          : 'Guardar movimiento'
          }}
        </span>

      </button>
    </div>
  </div>

</ion-content>
