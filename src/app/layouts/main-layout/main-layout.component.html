<ion-tabs>
  <ion-tab-bar slot="bottom" class="custom-tab-bar">
    
    <ion-tab-button tab="home">
      <ion-icon name="home-outline"></ion-icon>
      <ion-label>Inicio</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="analysis">
      <ion-icon name="stats-chart-outline"></ion-icon>
      <ion-label>Análisis</ion-label>
    </ion-tab-button>

    <ion-tab-button (click)="openRegisterMovement()" class="add" type="button">
      <ion-icon name="add"></ion-icon>
    </ion-tab-button>

    <ion-tab-button tab="goals">
      <ion-icon name="target-outline"></ion-icon>
      <ion-label>Metas</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="profile">
      <ion-icon name="person-outline"></ion-icon>
      <ion-label>Perfil</ion-label>
    </ion-tab-button>

  </ion-tab-bar>
</ion-tabs>
